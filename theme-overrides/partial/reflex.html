<p>
  {% set built_with = _('Built with %(pelican_url)s using %(theme_url)s theme',
      pelican_url='<a href="https://getpelican.com" target="_blank">Pelican</a>',
      theme_url='<a href="https://github.com/haplo/pelican-theme-reflex" target="_blank">Reflex</a>'|safe) %}
  {{ built_with }}
  {% if THEME_COLOR_ENABLE_USER_OVERRIDE %}
    <script id="dark-theme-script"
            src="{{ SITEURL }}/{{ THEME_STATIC_DIR }}/dark-theme/dark-theme.min.js"
            data-enable-auto-detect-theme="{{ THEME_COLOR_AUTO_DETECT_BROWSER_PREFERENCE|default('false') }}"
            data-default-theme="{{ THEME_COLOR|default('light') }}"
            type="text/javascript">
    </script>
  {% endif %}
</p>
